substitutions:
    _SERVICE_NAME: placeholder
    _REGION: us-central1

steps:
    - name: "gcr.io/cloud-builders/docker"
      args: ["build", "-t", "gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA", "."]
    - name: "gcr.io/cloud-builders/docker"
      args: ["push", "gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA"]
    - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
      entrypoint: gcloud
      args:
          - run
          - deploy
          - $_SERVICE_NAME
          - --image=gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA
          - --region=$_REGION
          - --platform=managed
          - --allow-unauthenticated
          - --service-account=tools-runner@storesight-internal-tools.iam.gserviceaccount.com
          - --clear-vpc-connector
          - --network=default
          - --subnet=default
          - --set-secrets=JWT_SIGNING_SECRET=JWT_SIGNING_SECRET:latest
          - --set-env-vars=INTERNAL_API_BASE=https://internal-tool-api.storesight.org,TOOL_SLUG=$_SERVICE_NAME
options:
    logging: CLOUD_LOGGING_ONLY
    machineType: E2_HIGHCPU_8
